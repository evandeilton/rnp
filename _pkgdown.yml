url: https://evandeilton.github.io/rnp/
template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary: '#2E86AB'
    base_font:
      google: Inter
    heading_font:
      google: Inter
    code_font:
      google: JetBrains Mono
home:
  title: rnp - Recursos estatisticos do projeto R NA PRATICA
  description: |
    Funcoes de estatistica descritiva, probabilidade, inferencia, regressao, multivariada e series temporais, com saidas tidy e rotinas em C++, em portugues.
navbar:
  structure:
    left:
    - intro
    - reference
    - articles
    - news
    right:
    - search
    - github
  components:
    articles:
      text: Tutoriais
      menu:
      - text: 1. Descritiva e Exploratoria
        href: articles/v01-descritiva.html
      - text: 2. Probabilidade e Teoremas Fundamentais
        href: articles/v02-probabilidade.html
      - text: 3. Inferencia Estatistica
        href: articles/v03-inferencia.html
      - text: 4. Regressao e Modelagem
        href: articles/v04-regressao.html
      - text: 5. Analise Multivariada
        href: articles/v05-multivariada.html
      - text: 6. Categoricos e Nao-Parametricos
        href: articles/v06-categoricos.html
